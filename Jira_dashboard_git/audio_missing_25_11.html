    <meta charset="UTF-8">

    <style>
        :root {
            --primary-dark: #00424a;
            --primary-light: #edfcff;
            --secondary-dark: #273f43;
            --secondary-light: #dbf6fa;
            --tertiary-dark: #2f3b58;
            --tertiary-light: #bac6ea;
            --background: #cde7ec;
            --neutral-dark: #393c3d;
            --neutral-light: #f8fafa;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--neutral-dark);
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        .chart-container {
            background-color: var(--neutral-light);
            border-radius: 0.75rem;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            transition: all 0.3s ease-in-out;
        }
        .chart-container:hover {
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            transform: translateY(-2px);
        }
        .tooltip {
            position: absolute;
            text-align: center;
            padding: 0.5rem;
            font-size: 0.875rem;
            background: var(--secondary-dark);
            color: var(--neutral-light);
            border: 0px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
        }
        .axis path,
        .axis line {
            fill: none;
            stroke: #a0aec0;
            shape-rendering: crispEdges;
        }
        .axis text {
            font-size: 12px;
            fill: var(--neutral-dark);
        }
        .grid-line {
            stroke: #e2e8f0;
            stroke-opacity: 0.7;
            shape-rendering: crispEdges;
        }
        .sidebar-toggle {
            z-index: 50;
        }
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
        .bar:hover {
            opacity: 0.8;
        }
        .line {
            fill: none;
            stroke-width: 2.5px;
        }
        .dot {
            stroke-width: 2px;
        }
        .legend-item {
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .legend-item.faded {
            opacity: 0.3;
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div class="flex h-screen bg-gray-100" style="background-color: var(--background);">

                </div>
            </nav>
            <div class="absolute bottom-4 left-0 w-full px-6">

        // Function to parse the specific CSV format and aggregated it by date
        function processCSV(csvText) {
            const lines = csvText.trim().split('\n');
            // Remove header
            lines.shift();

            const monthMap = {
                "janv": "01", "févr": "02", "mars": "03", "avr": "04", "mai": "05", "juin": "06",
                "juil": "07", "août": "08", "sept": "09", "oct": "10", "nov": "11", "déc": "12"
            };

            const data = {};

            lines.forEach(line => {
                if(!line.trim()) return;
                
                const parts = line.split(';');
                if (parts.length < 2) return;

                // 1. Parse Date: "24/nov./25 5:23 PM" -> "2025-11-24"
                const fullDateStr = parts[0].trim();
                const datePart = fullDateStr.split(' ')[0]; // "24/nov./25"
                const dateSegments = datePart.split('/');
                
                if (dateSegments.length < 3) return;

                const day = dateSegments[0].padStart(2, '0');
                const rawMonth = dateSegments[1].toLowerCase().replace('.', '');
                const month = monthMap[rawMonth];
                const year = "20" + dateSegments[2];

                if (!month) return; // invalid date format

                const isoDate = `${year}-${month}-${day}`;

                if (!data[isoDate]) {
                    data[isoDate] = {};
                }

                // 2. Parse Tags (Combine 2nd and 3rd column, handle multitag in one cell)
                let tagString = parts.slice(1).join(';'); // Combine all tag columns
                const tags = tagString.split(/;| /).filter(t => t.trim().length > 0 && t.trim() !== 'PM' && t.trim() !== 'AM'); 
                // Note: simplified splitting on semicolon. 
                // Specific handling for the provided csv format where tags are sometimes fused or in next col.
                // The CSV provided looks like: value;tag1;tag2 OR value;tag1;[empty]
                
                // Let's re-parse properly based on CSV structure
                // Column 1: Date, Column 2: Tag(s), Column 3: Optional Tag
                const tagsToCount = [];
                const col2 = parts[1] ? parts[1].trim() : "";
                const col3 = parts[2] ? parts[2].trim() : "";
                
                // Helper to split internal delimiters like "Dif_de_format;Doublons"
                const extract = (str) => str.split(';').filter(s => s.trim().length > 0);
                
                extract(col2).forEach(t => tagsToCount.push(t));
                extract(col3).forEach(t => tagsToCount.push(t));

                tagsToCount.forEach(tag => {
                    const cleanTag = tag.trim();
                    if (cleanTag) {
                        data[isoDate][cleanTag] = (data[isoDate][cleanTag] || 0) + 1;
                    }
                });
            });

            return data;
        }

        const rawData = processCSV(csvContent);

        document.addEventListener('DOMContentLoaded', function () {
            // --- Data Processing ---
            const allCategories = [...new Set(Object.values(rawData).flatMap(day => Object.keys(day)))];
            const parseDate = d3.timeParse("%Y-%m-%d");

            let processedData = Object.entries(rawData).map(([dateStr, values]) => {
                const entry = { date: parseDate(dateStr) };
                allCategories.forEach(cat => {
                    entry[cat] = values[cat] || 0;
                });
                return entry;
            }).sort((a, b) => a.date - b.date);

            const colorScale = d3.scaleOrdinal()
                .domain(allCategories)
                .range(["#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd", "#8c564b", "#e377c2", "#7f7f7f", "#bcbd22", "#17becf"]);

            const tooltip = d3.select("#tooltip");
            let currentBarChartCategory = null;

            // --- Initial Setup ---
            function initialize() {
                setupFilters();
                setupSelectors();
                setupEventListeners();
                updateDashboard();
            }

            function setupFilters() {
                if (processedData.length === 0) return;
                const dateExtent = d3.extent(processedData, d => d.date);
                d3.select("#startDate").attr("min", d3.timeFormat("%Y-%m-%d")(dateExtent[0])).attr("value", d3.timeFormat("%Y-%m-%d")(dateExtent[0]));
                d3.select("#endDate").attr("max", d3.timeFormat("%Y-%m-%d")(dateExtent[1])).attr("value", d3.timeFormat("%Y-%m-%d")(dateExtent[1]));
            }

            function setupSelectors() {
                const weeks = [...new Set(processedData.map(d => d3.timeFormat("%Y-W%U")(d.date)))].sort();
                const weekSelector = d3.select("#week-selector");
                weekSelector.selectAll("option")
                    .data(weeks)
                    .enter()
                    .append("option")
                    .attr("value", d => d)
                    .text(d => `Week of ${d3.timeParse("%Y-W%U")(d).toLocaleDateString()}`);
                if (weeks.length > 0) weekSelector.property("value", weeks[weeks.length - 1]);

                const months = [...new Set(processedData.map(d => d3.timeFormat("%Y-%m")(d.date)))].sort();
                const monthSelector = d3.select("#month-selector");
                monthSelector.selectAll("option")
                    .data(months)
                    .enter()
                    .append("option")
                    .attr("value", d => d)
                    .text(d => d3.timeParse("%Y-%m")(d).toLocaleString('default', { month: 'long', year: 'numeric' }));
                if (months.length > 0) monthSelector.property("value", months[months.length - 1]);
            }

            function setupEventListeners() {
                d3.select("#startDate").on("change", updateDashboard);
                d3.select("#endDate").on("change", updateDashboard);
                d3.select("#resetFilters").on("click", () => {
                    setupFilters();
                    updateDashboard();
                });
                d3.select("#week-selector").on("change", updateDashboard);
                d3.select("#month-selector").on("change", updateDashboard);
                d3.select("#backToOverviewBtn").on("click", () => {
                    currentBarChartCategory = null;
                    d3.select("#backToOverviewBtn").classed("hidden", true);
                    updateDashboard();
                });
                d3.select("#downloadBtn").on("click", downloadHTML);
                
                const sidebar = document.getElementById('sidebar');
                const toggle = document.getElementById('sidebar-toggle');
                toggle.addEventListener('click', () => {
                    sidebar.classList.toggle('-translate-x-full');
                });

                window.addEventListener('resize', updateDashboard);
            }

            // --- Main Update Function ---
            function updateDashboard() {
                if (processedData.length === 0) return;
                const startDateStr = d3.select("#startDate").property("value");
                const endDateStr = d3.select("#endDate").property("value");

                if (!startDateStr || !endDateStr) return;

                const startDate = parseDate(startDateStr);
                const endDate = parseDate(endDateStr);
                
                const filteredData = processedData.filter(d => d.date >= startDate && d.date <= endDate);

                drawBarChart(filteredData);
                drawLineChart(filteredData);
                drawPieCharts(processedData); 
            }

            // --- Chart Drawing Functions ---
            function drawBarChart(data) {
                const container = d3.select("#bar-chart");
                container.html("");
                const bounds = container.node().getBoundingClientRect();
                const margin = { top: 20, right: 30, bottom: 100, left: 60 };
                const width = bounds.width - margin.left - margin.right;
                const height = 400 - margin.top - margin.bottom;

                const svg = container.append("svg")
                    .attr("width", width + margin.left + margin.right)
                    .attr("height", height + margin.top + margin.bottom)
                    .append("g")
                    .attr("transform", `translate(${margin.left},${margin.top})`);

                let chartData, x, y, xAxis, yAxis;

                if (currentBarChartCategory) {
                    // Detail view
                    chartData = data.map(d => ({ date: d.date, value: d[currentBarChartCategory] })).filter(d => d.value > 0);
                    x = d3.scaleTime().range([0, width]).domain(d3.extent(chartData, d => d.date));
                    y = d3.scaleLinear().range([height, 0]).domain([0, d3.max(chartData, d => d.value) || 0]);
                    xAxis = d3.axisBottom(x).ticks(10).tickFormat(d3.timeFormat("%b %d"));
                    yAxis = d3.axisLeft(y).ticks(5).tickFormat(d3.format("d"));
                } else {
                    // Overview view
                    chartData = allCategories.map(cat => ({
                        category: cat,
                        value: d3.sum(data, d => d[cat])
                    })).sort((a, b) => b.value - a.value);
                    x = d3.scaleBand().range([0, width]).padding(0.1).domain(chartData.map(d => d.category));
                    y = d3.scaleLinear().range([height, 0]).domain([0, d3.max(chartData, d => d.value) || 0]);
                    xAxis = d3.axisBottom(x);
                    yAxis = d3.axisLeft(y).ticks(5).tickFormat(d3.format("d"));
                }

                svg.append("g")
                    .attr("class", "x-axis")
                    .attr("transform", `translate(0,${height})`)
                    .call(xAxis)
                    .selectAll("text")
                    .attr("transform", "translate(-10,0)rotate(-45)")
                    .style("text-anchor", "end");

                svg.append("g").attr("class", "y-axis").call(yAxis);
                
                // Add Y-axis grid lines
                svg.append("g")
                    .attr("class", "grid")
                    .call(d3.axisLeft(y).tickSize(-width).tickFormat(""))
                    .selectAll("line").attr("class", "grid-line");

                svg.selectAll(".bar")
                    .data(chartData)
                    .enter().append("rect")
                    .attr("class", "bar")
                    .attr("x", d => currentBarChartCategory ? x(d.date) - (width/Math.max(1, chartData.length))/2 : x(d.category))
                    .attr("width", currentBarChartCategory ? Math.max(2, width/chartData.length - 2) : x.bandwidth())
                    .attr("y", d => y(d.value))
                    .attr("height", d => height - y(d.value))
                    .attr("fill", d => colorScale(currentBarChartCategory || d.category))
                    .style("cursor", currentBarChartCategory ? "default" : "pointer")
                    .on("mouseover", (event, d) => {
                        tooltip.style("opacity", 1);
                    })
                    .on("mousemove", (event, d) => {
                        const text = currentBarChartCategory 
                            ? `${d3.timeFormat("%Y-%m-%d")(d.date)}: ${d.value}`
                            : `${d.category}: ${d.value}`;
                        tooltip.html(text)
                            .style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 28) + "px");
                    })
                    .on("mouseout", () => {
                        tooltip.style("opacity", 0);
                    })
                    .on("click", (event, d) => {
                        if (!currentBarChartCategory) {
                            currentBarChartCategory = d.category;
                            d3.select("#backToOverviewBtn").classed("hidden", false);
                            updateDashboard();
                        }
                    });
            }

            function drawLineChart(data) {
                const container = d3.select("#line-chart");
                container.html("");
                const bounds = container.node().getBoundingClientRect();
                const margin = { top: 20, right: 30, bottom: 30, left: 60 };
                const width = bounds.width - margin.left - margin.right;
                const height = 400 - margin.top - margin.bottom;

                const svg = container.append("svg")
                    .attr("width", width + margin.left + margin.right)
                    .attr("height", height + margin.top + margin.bottom)
                    .append("g")
                    .attr("transform", `translate(${margin.left},${margin.top})`);

                const series = allCategories.map(cat => ({
                    name: cat,
                    values: data.map(d => ({ date: d.date, value: d[cat] }))
                }));

                const x = d3.scaleTime()
                    .domain(d3.extent(data, d => d.date))
                    .range([0, width]);

                const yMax = d3.max(series, s => d3.max(s.values, d => d.value));
                const y = d3.scaleLinear()
                    .domain([0, yMax || 1])
                    .range([height, 0]).nice();

                svg.append("g")
                    .attr("transform", `translate(0,${height})`)
                    .call(d3.axisBottom(x));

                svg.append("g").call(d3.axisLeft(y).ticks(5).tickFormat(d3.format("d")));
                
                svg.append("g")
                    .attr("class", "grid")
                    .call(d3.axisLeft(y).tickSize(-width).tickFormat(""))
                    .selectAll("line").attr("class", "grid-line");

                const line = d3.line()
                    .x(d => x(d.date))
                    .y(d => y(d.value))
                    .curve(d3.curveMonotoneX); // Smooth lines

                svg.selectAll(".line-path")
                    .data(series)
                    .enter().append("path")
                    .attr("class", d => `line-path line-${d.name.replace(/\s+/g, '-')}`)
                    .attr("d", d => line(d.values))
                    .style("stroke", d => colorScale(d.name))
                    .style("fill", "none")
                    .style("stroke-width", 2);

                // Legend
                const legendContainer = d3.select("#line-chart-legend");
                legendContainer.html("");
                legendContainer.selectAll(".legend-item")
                    .data(allCategories)
                    .enter().append("div")
                    .attr("class", "legend-item flex items-center")
                    .on("click", (event, d) => {
                        const isActive = !d3.select(event.currentTarget).classed("faded");
                        d3.select(event.currentTarget).classed("faded", isActive);
                        svg.selectAll(`.line-${d.replace(/\s+/g, '-')}`).style("display", isActive ? "none" : "initial");
                    })
                    .each(function(d) {
                        d3.select(this).append("div")
                            .attr("class", "w-4 h-4 rounded-full mr-2")
                            .style("background-color", colorScale(d));
                        d3.select(this).append("span").text(d);
                    });
            }

            function drawPieCharts(fullData) {
                // Weekly Pie
                const selectedWeek = d3.select("#week-selector").property("value");
                if (selectedWeek) {
                    const weekData = fullData.filter(d => d3.timeFormat("%Y-W%U")(d.date) === selectedWeek);
                    const weekTotals = aggregateData(weekData);
                    drawSinglePie("#pie-chart-week", weekTotals);
                }

                // Monthly Pie
                const selectedMonth = d3.select("#month-selector").property("value");
                if (selectedMonth) {
                    const monthData = fullData.filter(d => d3.timeFormat("%Y-%m")(d.date) === selectedMonth);
                    const monthTotals = aggregateData(monthData);
                    drawSinglePie("#pie-chart-month", monthTotals);
                }
            }

            function aggregateData(data) {
                const totals = {};
                allCategories.forEach(cat => {
                    totals[cat] = d3.sum(data, d => d[cat]);
                });
                return Object.entries(totals).map(([key, value]) => ({ category: key, value: value })).filter(d => d.value > 0);
            }

            function drawSinglePie(selector, data) {
                const container = d3.select(selector);
                container.html("");
                const bounds = container.node().getBoundingClientRect();
                const width = bounds.width;
                const height = 300;
                const radius = Math.min(width, height) / 2 - 10;

                const svg = container.append("svg")
                    .attr("width", width)
                    .attr("height", height)
                    .append("g")
                    .attr("transform", `translate(${width / 2},${height / 2})`);

                if (data.length === 0) {
                    svg.append("text")
                        .attr("text-anchor", "middle")
                        .attr("dy", "0.35em")
                        .text("No data for this period.");
                    return;
                }

                const pie = d3.pie().value(d => d.value).sort(null);
                const arc = d3.arc().innerRadius(0).outerRadius(radius);

                const path = svg.selectAll("path")
                    .data(pie(data))
                    .enter().append("path")
                    .attr("d", arc)
                    .attr("fill", d => colorScale(d.data.category))
                    .attr("stroke", "white")
                    .style("stroke-width", "2px")
                    .on("mouseover", (event, d) => {
                        tooltip.style("opacity", 1);
                        d3.select(event.currentTarget).style("opacity", 0.8);
                    })
                    .on("mousemove", (event, d) => {
                        const total = d3.sum(data, item => item.value);
                        const percent = (d.data.value / total * 100).toFixed(1);
                        tooltip.html(`${d.data.category}: ${d.data.value} (${percent}%)`)
                            .style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 28) + "px");
                    })
                    .on("mouseout", (event, d) => {
                        tooltip.style("opacity", 0);
                        d3.select(event.currentTarget).style("opacity", 1);
                    });
            }

            function downloadHTML() {
                const htmlContent = document.documentElement.outerHTML;
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'jira_dashboard.html';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            initialize();
        });
    </script>
